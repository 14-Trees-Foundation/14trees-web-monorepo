# .github/workflows/deploy-api.yml
name: Deploy API

on:
  push:
    branches: [ci_setup]
    paths:
      - 'apps/api/**'          # only triggers when api code changes
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:            # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.12.2
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        working-directory: apps/api
        run: npm ci

      - name: Build
        working-directory: apps/api
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build output ==="
          ls -la apps/api/dist/
          echo "=== Entry point exists ==="
          test -f apps/api/dist/apps/api/src/server.js && echo "✅ server.js found" || echo "❌ server.js NOT found"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 3

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build                 # only runs if build succeeds

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: api-dist
          path: dist/

      - name: Copy build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/"
          target: "/home/ubuntu/14trees-web-monorepo/apps/api/dist-new/"
          strip_components: 1    # removes the leading dist/ from paths

      - name: Verify files landed
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=== New build ==="
            ls -la /home/ubuntu/14trees-web-monorepo/apps/api/dist-new/
            echo "=== Live build ==="
            ls -la /home/ubuntu/14trees-web-monorepo/apps/api/dist/
            echo "✅ Files copied safely — live app untouched"
